name: Semgrep Spring

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  schedule:
    - cron: '41 5 * * 3'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  semgrep:
    name: Spring scan
    runs-on: ubuntu-latest

    container:
      image: semgrep/semgrep:latest

    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run Semgrep default Java rules
        run: |
          semgrep scan \
            --config auto \
            --config p/java \
            --config p/findsecbugs \
            --sarif \
            --output semgrep-spring.sarif \
            .

      - name: Normalize SARIF security severity for GitHub
        if: always()
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("semgrep-spring.sarif")
          sarif = json.loads(path.read_text())

          severity_map = {
              "critical": "9.0",
              "high": "8.0",
              "error": "8.0",
              "medium": "5.0",
              "warning": "5.0",
              "low": "2.0",
              "info": "1.0",
              "note": "1.0",
          }

          for run in sarif.get("runs", []):
              for rule in run.get("tool", {}).get("driver", {}).get("rules", []):
                  props = rule.setdefault("properties", {})
                  value = props.get("security-severity")

                  if isinstance(value, str):
                      normalized = severity_map.get(value.strip().lower())
                      if normalized:
                          props["security-severity"] = normalized
                      else:
                          props.pop("security-severity", None)

          path.write_text(json.dumps(sarif, indent=2))
          PY

      - name: Upload SARIF file
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-spring.sarif
